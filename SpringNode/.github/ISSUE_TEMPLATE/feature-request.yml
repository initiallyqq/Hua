name: "🎉 功能建议 / Feature Request"
title: "[Feature]"
description: 为 SpringNote 提出改进建议。/ Suggest an improvement for SpringNote.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你为 SpringNote 提出新想法。请清楚描述问题、使用场景和期望效果。/ Thanks for suggesting a new idea for SpringNote. Please describe the problem, use case, and expected behavior clearly.

  - type: textarea
    attributes:
      label: 你遇到的问题 / Problem
      description: 这个功能想解决什么问题？/ What problem does this feature solve?
      placeholder: |
        示例：我经常需要回顾上周的记录，但当前流程需要太多手动操作。
        Example: I often need to review last week's notes, but the current flow requires too many manual steps.
    validations:
      required: true

  - type: textarea
    attributes:
      label: 期望方案 / Proposed solution
      description: 请描述你希望实现的行为或界面。/ Describe the behavior or UI you want.
      placeholder: |
        请描述它在 SpringNote 中应该如何工作。
        Describe how this should work in SpringNote.
    validations:
      required: true

  - type: textarea
    attributes:
      label: 使用场景 / Use case
      description: 你会在什么时候、为什么使用这个功能？/ When and why would you use this feature?
      placeholder: |
        示例：在写日报时，我希望 AI 可以……
        Example: When writing daily notes, I want AI to...
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 相关模块 / Related area
      description: 这个建议主要影响哪个模块？/ Which part of SpringNote does this suggestion affect?
      multiple: true
      options:
        - "首页 / Home"
        - "便签 / Notes"
        - "回忆书 / Memory Book"
        - "设置 / Settings"
        - "统计 / Statistics"
        - "桌面组件 / Desktop Widget"
        - "AI 提供商 / AI Provider"
        - "工作流 / Workflow"
        - "其他 / Other"
    validations:
      required: true

  - type: textarea
    attributes:
      label: 你考虑过的替代方案 / Alternatives considered
      description: 可选。你是否考虑过其他替代方案或临时处理方式？/ Optional. Have you tried another workaround or design?

  - type: checkboxes
    attributes:
      label: 贡献意愿 / Contribution
      description: 这不是必需项。/ This is optional.
      options:
        - label: 我愿意为这个功能提交 PR。/ I am willing to submit a PR for this feature.

  - type: checkboxes
    attributes:
      label: 行为准则 / Code of Conduct
      options:
        - label: 我已阅读并同意遵守项目行为准则。/ I have read and agree to follow the project's Code of Conduct.
          required: true

  - type: markdown
    attributes:
      value: "感谢你的建议！/ Thanks for your suggestion!"
